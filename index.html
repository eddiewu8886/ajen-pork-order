<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
    // ★★★ 請替換成您的設定 ★★★
    // 這是您提供的最新 API 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxj3cuMgcG0yENin7dGaB-OlIBnX6VMeogVDBCNjWHrzTDa69-TjY85MVaLmH-HezXZ/exec";  
    const LIFF_ID = "2008905608-DekFDzvW"; 
    
    let GLOBAL_MENU = {};

    window.onload = function() {

        liff.init({ liffId: LIFF_ID }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(profile => {
                    document.getElementById('userId').value = profile.userId;
                    document.getElementById('userNameInput').value = profile.displayName;
                    
                    // ★★★ 新增判斷：如果網址有帶 ?action=check，就自動幫客人打開查詢視窗 ★★★
                    let urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('action') === 'check') {
                        setTimeout(() => { checkMyOrders(); }, 500); 
                    }
                });
            } else {
                liff.login();
            }
        });

        initSystem();
        checkAddonAvailability();
    };

    function initSystem() {
        const dateSelect = document.getElementById('pickupDate');
        
        // ★ 監聽日期變更：當使用者換日期，自動更新價格
        dateSelect.addEventListener('change', function() {
            updateMenuPrices();
        });

        fetch(API_URL) 
        .then(response => response.json())
        .then(data => {
            // --- 1. 處理日期 ---
            if (data.dates.length === 0) {
                 document.getElementById('closedOverlay').style.display = 'block';
                 document.getElementById('closedReason').innerText = "目前無開放日期，請稍後再來！";
                 document.getElementById('skeletonOverlay').style.display = 'none'; 
                 return;
            } else {
                 document.getElementById('closedOverlay').style.display = 'none';
                 dateSelect.innerHTML = '<option value="" disabled selected>請選擇取貨日期</option>';
                 
                 data.dates.forEach(item => {
                    let option = document.createElement("option");
                    option.value = item.value; 
                    option.text = item.text;   
                    if (item.disabled) option.disabled = true; 
                    
                    // ★ 儲存檔期代號 (CNY 或 normal) 到選項中
                    if (item.type) {
                        option.dataset.priceType = item.type;
                    } else {
                        option.dataset.priceType = "normal";
                    }

                    dateSelect.add(option);
                });
            }

            // --- 2. 處理菜單 ---
            if (data.menu) {
                GLOBAL_MENU = data.menu;
                // 資料載入後，先執行一次價格更新 (顯示預設或第一天的價格)
                updateMenuPrices();
            }

            setTimeout(() => {
                document.getElementById('skeletonOverlay').style.display = 'none';
            }, 300);
        })
        .catch(err => {
            console.error("載入失敗", err);
            dateSelect.innerHTML = '<option value="" disabled>載入失敗，請重新整理</option>';
            document.getElementById('skeletonOverlay').style.display = 'none';
        });
    }

    // ★ 核心功能：根據日期更新價格 + 檢查售完狀態
    function updateMenuPrices() {
        const dateSelect = document.getElementById('pickupDate');
        // 取得目前選中日期的檔期類型
        const selectedOption = dateSelect.options[dateSelect.selectedIndex];
        const currentType = (selectedOption && selectedOption.dataset.priceType) ? selectedOption.dataset.priceType : 'normal';
        
        for (const [key, item] of Object.entries(GLOBAL_MENU)) {
            let priceDiv = document.getElementById('price_' + key);
            let inputDiv = document.getElementById(key); // 數量輸入框

            // 1. 先處理售完狀態 (優先級最高)
            if (item.soldOut) {
                if (priceDiv) {
                    priceDiv.innerHTML = '<span style="color:#d9534f;"><i class="fas fa-times-circle"></i> 已售完</span>';
                    priceDiv.style.backgroundColor = 'transparent';
                    priceDiv.style.border = '1px solid #d9534f';
                    priceDiv.style.color = 'inherit'; // 重置顏色
                }
                
                if (inputDiv) {
                    inputDiv.value = 0;
                    inputDiv.disabled = true;
                    let parent = inputDiv.parentElement;
                    if (parent) {
                        let btns = parent.querySelectorAll('button');
                        btns.forEach(btn => btn.disabled = true);
                    }
                }
                
                let rowItem = document.getElementById('item_' + key); 
                if (!rowItem && inputDiv) rowItem = inputDiv.closest('.menu-item');
                if (rowItem) rowItem.classList.add('item-sold-out');

                continue; // 已售完就不用管價錢了，換下一個品項
            } 
            
            // 2. 如果沒售完，需解除鎖定 (以防萬一)
            if (inputDiv) {
                inputDiv.disabled = false;
                let parent = inputDiv.parentElement;
                if (parent) {
                    let btns = parent.querySelectorAll('button');
                    btns.forEach(btn => btn.disabled = false);
                }
            }
            let rowItem = document.getElementById('item_' + key);
            if (!rowItem && inputDiv) rowItem = inputDiv.closest('.menu-item');
            if (rowItem) rowItem.classList.remove('item-sold-out');

            // 3. 處理價格顯示 (一般 vs 過年)
            if (priceDiv) {
                // 重置樣式
                priceDiv.style.backgroundColor = '#EFEBE9';
                priceDiv.style.border = 'none';

                let displayMin = item.min;
                let displayMax = item.max;
                let isCNY = false;

                // 判斷：如果是 CNY 檔期 且 該品項有設定過年價
                if (currentType === 'CNY' && item.min_cny) {
                    displayMin = item.min_cny;
                    // 如果最高價沒填，預設跟最低價一樣
                    displayMax = item.max_cny ? item.max_cny : item.min_cny;
                    isCNY = true;
                }

                // 更新文字
                if (displayMin == displayMax) {
                    priceDiv.innerText = `$${displayMin} / 份`;
                } else {
                    priceDiv.innerText = `$${displayMin} ~ $${displayMax} / 份`;
                }

                // 變色提示
                if (isCNY) {
                    priceDiv.style.color = "#D84315"; // 過年紅
                    priceDiv.style.fontWeight = "bold";
                } else {
                    priceDiv.style.color = "var(--primary-color)";
                }
            }
        }
    }

    function checkAddonAvailability() {
        let mainQty = (parseInt(document.getElementById('qty_pork').value) || 0) +
                      (parseInt(document.getElementById('qty_thigh').value) || 0) +
                      (parseInt(document.getElementById('qty_feet').value) || 0);

        const extraRow = document.getElementById('row_extra');
        const extraBtns = document.querySelectorAll('.btn-extra');
        const extraInput = document.getElementById('qty_extra');
        const lockMsg = document.getElementById('lockMsg');

        // 檢查加購品項本身是否已售完
        let isExtraSoldOut = extraInput.disabled && GLOBAL_MENU['qty_extra'] && GLOBAL_MENU['qty_extra'].soldOut;

        if (isExtraSoldOut) {
             return; 
        }

        if (mainQty > 0) {
            extraRow.style.opacity = '1';
            lockMsg.style.display = 'none';
            extraBtns.forEach(btn => btn.disabled = false);
            extraInput.disabled = false;
        } else {
            extraRow.style.opacity = '0.6';
            lockMsg.style.display = 'inline-block';
            extraBtns.forEach(btn => btn.disabled = true);
            extraInput.disabled = true;
            extraInput.value = 0; 
        }
        updateSummary(); 
    }

    function changeQty(id, delta) {
        const input = document.getElementById(id);
        if (input.disabled) return; 

        let currentVal = parseInt(input.value) || 0;
        let newVal = currentVal + delta;
        if (newVal < 0) newVal = 0;
        if (newVal > 50) newVal = 50;
        input.value = newVal;
        checkAddonAvailability();
    }

    function manualChange(id) {
        const input = document.getElementById(id);
        let val = parseInt(input.value);
        if (isNaN(val)) return;
        if (val < 0) input.value = 0;
        if (val > 50) input.value = 50;
        checkAddonAvailability();
    }

    function checkEmpty(id) {
        const input = document.getElementById(id);
        if (input.value === "" || isNaN(parseInt(input.value))) {
            input.value = 0;
            checkAddonAvailability();
        }
    }

    function updateSummary() {
        let items = [
            {id: 'qty_pork', name: '封肉'},
            {id: 'qty_thigh', name: '蹄膀'},
            {id: 'qty_feet', name: '豬腳'},
            {id: 'qty_bamboo', name: '筍干'},
            {id: 'qty_extra', name: '加購腳蹄'}
        ];

        let summary = [];
        items.forEach(item => {
            let val = parseInt(document.getElementById(item.id).value) || 0;
            if (val > 0) {
                let displayName = (GLOBAL_MENU[item.id]) ? GLOBAL_MENU[item.id].name : item.name;
                summary.push(`${displayName}x${val}`);
            }
        });

        let displayDiv = document.getElementById('summaryDisplay');
        if (summary.length > 0) {
            displayDiv.style.display = 'block';
            displayDiv.innerHTML = "🛒 目前選擇： " + summary.join('、');
        } else {
            displayDiv.style.display = 'none';
        }
    }

    function submitOrder() {
        let qty_pork = document.getElementById('qty_pork').value;
        let qty_thigh = document.getElementById('qty_thigh').value;
        let qty_feet = document.getElementById('qty_feet').value;
        let qty_bamboo = document.getElementById('qty_bamboo').value;
        let qty_extra = document.getElementById('qty_extra').value;

        let manualName = document.getElementById('userNameInput').value;
        let userPhone = document.getElementById('userPhone').value;
        let noteInput = document.getElementById('note').value;
        
        let pickupDateSelect = document.getElementById('pickupDate'); 
        let pickupDate = pickupDateSelect.value;
        
        if (!pickupDate) { 
            Swal.fire({ icon: 'warning', title: '請選擇日期', text: '記得告訴我們哪天要來拿喔！📅', confirmButtonColor: '#9A7E6F' });
            setTimeout(() => pickupDateSelect.focus(), 500); 
            return; 
        }

        let selectedOptionText = pickupDateSelect.options[pickupDateSelect.selectedIndex].text;
        if (selectedOptionText.includes("(已額滿)") || selectedOptionText.includes("(已截止)")) {
            Swal.fire({ icon: 'error', title: '無法下單', text: '抱歉！該日期已額滿或截止 😭', confirmButtonColor: '#9A7E6F' });
            return; 
        }

        if (!manualName) { 
            Swal.fire({ icon: 'warning', title: '忘記填名字囉', text: '請填寫取貨人姓名 👤', confirmButtonColor: '#9A7E6F' });
            setTimeout(() => document.getElementById('userNameInput').focus(), 500);
            return; 
        }
        if (!userPhone) { 
            Swal.fire({ icon: 'warning', title: '忘記填電話囉', text: '請填寫聯絡電話 📞', confirmButtonColor: '#9A7E6F' });
            setTimeout(() => document.getElementById('userPhone').focus(), 500);
            return; 
        }
        
        if (qty_pork==0 && qty_feet==0 && qty_thigh==0 && qty_bamboo==0 && qty_extra==0) { 
            Swal.fire({ icon: 'question', title: '購物車是空的', text: '您還沒選擇任何美味餐點喔！😅', confirmButtonColor: '#9A7E6F' });
            return; 
        }

        const orderData = {
            pickupDate: pickupDate,
            userName: manualName,
            userPhone: userPhone,
            qty_pork: qty_pork,
            qty_thigh: qty_thigh,
            qty_feet: qty_feet,
            qty_bamboo: qty_bamboo,
            qty_extra: qty_extra, 
            note: noteInput,
            // ★ 新增：把客人的 LINE ID 一起送給後端儲存
            userId: document.getElementById('userId').value 
        };

        // ★ 取得目前的檔期類型 (為了計算正確金額)
        const selectedOption = pickupDateSelect.options[pickupDateSelect.selectedIndex];
        const currentType = (selectedOption && selectedOption.dataset.priceType) ? selectedOption.dataset.priceType : 'normal';

        let receiptItems = [];
        let itemsToCheck = ['qty_pork', 'qty_thigh', 'qty_feet', 'qty_bamboo', 'qty_extra'];
        
        itemsToCheck.forEach(key => {
            let qty = parseInt(document.getElementById(key).value) || 0;
            if (qty > 0) {
                let itemData = GLOBAL_MENU[key];
                if (itemData) {
                    // ★ 判斷價格邏輯
                    let useMin = itemData.min;
                    let useMax = itemData.max;
                    
                    if (currentType === 'CNY' && itemData.min_cny) {
                        useMin = itemData.min_cny;
                        useMax = itemData.max_cny ? itemData.max_cny : itemData.min_cny;
                    }

                    let priceStr = "";
                    if (useMin == useMax) {
                        priceStr = `$${useMin * qty}`;
                    } else {
                        priceStr = `約$${useMin * qty}~$${useMax * qty}`;
                    }
                    receiptItems.push(`${itemData.name} x${qty} (${priceStr})`);
                } else {
                    receiptItems.push(`品項(${key}) x${qty}`);
                }
            }
        });

        let receiptText = `【阿珍封肉 - 訂購成功】\n` +
                          `📅 取貨日期：${pickupDate}\n` +
                          `👤 取貨人：${manualName}\n` +
                          `------------------\n` +
                          `${receiptItems.join('\n')}\n` +
                          `------------------\n` +
                          `📞 電話：${userPhone}\n` +
                          `📝 備註：${noteInput || '無'}\n\n` +
                          `※ 價格僅供參考，實際金額依現場秤重為主。\n` + 
                          `已收到您的訂單，當天見！❤️`;

        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;

        Swal.fire({
            title: '訂單處理中...',
            html: '正在將資料傳送給阿珍，請稍候 ⏳',
            allowOutsideClick: false, 
            didOpen: () => {
                Swal.showLoading(); 
            }
        });

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(orderData)
        })
        .then(response => response.json())
        .then(data => {
            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: receiptText }])
                .then(() => {
                    Swal.fire({
                        icon: 'success',
                        title: '訂購成功！',
                        text: '訂單明細已傳送至聊天室 ✅',
                        confirmButtonText: '關閉視窗',
                        confirmButtonColor: '#9A7E6F'
                    }).then(() => {
                        liff.closeWindow();
                    });
                })
                .catch((err) => {
                    Swal.fire({ 
                        icon: 'success', 
                        title: '訂購成功！', 
                        text: '但訊息傳送失敗，請手動關閉視窗。',
                        confirmButtonColor: '#9A7E6F' 
                    }).then(() => liff.closeWindow());
                });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: '訂購成功！',
                    text: '我們已收到您的訂單',
                    confirmButtonText: '再訂一筆',
                    confirmButtonColor: '#9A7E6F'
                }).then(() => {
                    window.location.reload(); 
                });
            }
        })
        .catch(error => {
            Swal.fire({
                icon: 'error',
                title: '發生錯誤',
                text: '連線似乎有點問題，請稍後再試一次 ❌',
                confirmButtonColor: '#d33'
            });
            btn.innerHTML = '確認送出訂單 <i class="fas fa-paper-plane ms-2"></i>';
            btn.disabled = false;
        });
    }

    // ==========================================
    // ★ 新增功能：我的訂單查詢邏輯 (LINE ID 或 電話)
    // ==========================================
    function checkMyOrders() {
        let userId = document.getElementById('userId').value;
        
        if (userId) {
            // 情境 1：在 LINE 裡面開啟，直接用 LINE ID 無感查詢
            fetchOrders(userId, 'userId');
        } else {
            // 情境 2：不在 LINE 裡面（例如普通網頁），跳出視窗要電話號碼
            Swal.fire({
                title: '查詢訂單',
                text: '請輸入您預訂時填寫的聯絡電話：',
                input: 'tel',
                inputPlaceholder: '例如：0912345678',
                showCancelButton: true,
                confirmButtonText: '開始查詢',
                cancelButtonText: '取消',
                confirmButtonColor: '#9A7E6F',
                inputValidator: (value) => {
                    if (!value) {
                        return '請輸入電話號碼才能查詢喔！'
                    }
                }
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    // 將輸入的電話去除前後空白，送給後端查詢
                    fetchOrders(result.value.trim(), 'phone');
                }
            });
        }
    }

    // 發送請求並顯示訂單的共用函式
    function fetchOrders(searchValue, searchType) {
        Swal.fire({
            title: '努力尋找中...',
            html: '正在為您調閱歷史訂單 🔍',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // 打 API (加上 searchType 來決定是用 userId 還是 phone 查)
        let requestUrl = API_URL + "?action=getMyOrders&" + searchType + "=" + encodeURIComponent(searchValue);

        fetch(requestUrl)
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                if (data.orders.length === 0) {
                    Swal.fire({
                        icon: 'info', title: '目前沒有訂單', text: '您尚未建立任何訂單，或查無此電話資料！😋', confirmButtonColor: '#9A7E6F'
                    });
                    return;
                }

                // 組合顯示畫面 (文青風格小卡)
                let htmlStr = '<div style="text-align:left; max-height:60vh; overflow-y:auto; font-size:0.95rem; padding: 5px;">';
                data.orders.forEach((o) => {
                    let statusColor = o.status === '已處理' ? '#4CAF50' : '#D84315';
                    htmlStr += `
                    <div style="border: 1px solid #EFEBE9; padding: 15px; margin-bottom: 12px; border-radius: 10px; background-color: #FAFAFA; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #D7CCC8; padding-bottom: 8px; margin-bottom: 8px;">
                            <b style="color: #5D4037; font-size: 1.05rem;">🗓️ 取貨：${o.pickupDate}</b>
                            <span style="color: ${statusColor}; font-weight: bold; font-size: 0.9rem; background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid ${statusColor};">${o.status}</span>
                        </div>
                        <div style="color: #8D6E63; font-size: 0.8rem; margin-bottom: 5px;">下單時間：${o.time}</div>
                        <div style="line-height: 1.6; color: #4A4641;">
                            ${o.pork > 0 ? '封肉x'+o.pork+'&nbsp;&nbsp;' : ''}
                            ${o.thigh > 0 ? '蹄膀x'+o.thigh+'&nbsp;&nbsp;' : ''}
                            ${o.feet > 0 ? '豬腳x'+o.feet+'&nbsp;&nbsp;' : ''}
                            ${o.bamboo > 0 ? '筍干x'+o.bamboo+'&nbsp;&nbsp;' : ''}
                            ${o.extra > 0 ? '腳蹄x'+o.extra : ''}
                        </div>
                    </div>`;
                });
                htmlStr += '</div>';

                Swal.fire({
                    title: '📋 我的訂單',
                    html: htmlStr,
                    confirmButtonText: '關閉視窗',
                    confirmButtonColor: '#9A7E6F'
                });
            } else {
                throw new Error("API 回傳失敗");
            }
        })
        .catch(err => {
            Swal.fire({
                icon: 'error', title: '連線異常', text: '暫時無法讀取您的訂單，請稍後再試。', confirmButtonColor: '#d33'
            });
        });
    }
</script>
