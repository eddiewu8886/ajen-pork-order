<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿珍封肉 - 我的訂單</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #9A7E6F;
            --bg-color: #F8F5F2;
            --card-bg: #ffffff;
            --text-dark: #5D4037;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-dark); 
            padding: 20px 15px;
        }

        .container-box { max-width: 600px; margin: 0 auto; }

        .page-title {
            text-align: center;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* 訂單卡片設計 */
        .order-card {
            background-color: var(--card-bg);
            border: 1px solid #EFEBE9;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(154, 126, 111, 0.08);
        }
        
        .order-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed #D7CCC8; padding-bottom: 12px; margin-bottom: 12px;
        }

        .status-badge {
            font-weight: bold; font-size: 0.9rem; padding: 4px 10px; border-radius: 6px;
        }
        .status-done { color: #4CAF50; border: 1px solid #4CAF50; background: #F1F8E9; }
        .status-wait { color: #D84315; border: 1px solid #D84315; background: #FBE9E7; }

        .btn-primary-custom {
            background-color: var(--primary-color); color: white;
            border: none; border-radius: 12px; padding: 12px; width: 100%;
            font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(154, 126, 111, 0.2);
        }

        .back-btn {
            display: block; text-align: center; margin-top: 30px;
            color: #8D6E63; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h3 class="page-title"><i class="fas fa-receipt"></i> 歷史訂單查詢</h3>

    <!-- 狀態提示區：載入中 -->
    <div id="loadingSection" class="text-center" style="padding: 40px 0;">
        <div class="spinner-border text-secondary mb-3" role="status"></div>
        <div style="color: #8D6E63; font-weight: bold;">正在尋找您的專屬訂單...</div>
    </div>

    <!-- 訂單列表顯示區 -->
    <div id="orderListSection" style="display: none;"></div>

    <!-- 電話查詢區塊 (預設隱藏，有需要時會自動顯示) -->
    <div id="phoneSection" style="display: none;">
        <div class="order-card text-center" style="background-color: #FAFAFA; border: 2px dashed #D7CCC8;">
            <i class="fas fa-phone-alt" style="font-size: 2.5rem; color: #D7CCC8; margin-bottom: 15px;"></i>
            <h5 style="font-weight: bold; color: var(--text-dark);">用電話號碼查詢</h5>
            <p style="color: #8D6E63; font-size: 0.9rem; margin-bottom: 15px;">若無訂單顯示，可試試輸入電話查詢</p>
            <input type="tel" id="searchPhone" class="form-control mb-3" placeholder="例如：0912345678" style="text-align: center; letter-spacing: 2px;">
            <button class="btn-primary-custom" onclick="searchByPhone()">開始查詢</button>
        </div>
    </div>

    <a href="https://liff.line.me/2008905608-DekFDzvW" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回線上點餐
    </a>
</div>

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    // ★★★ 請替換成您的設定 ★★★
    const API_URL = "https://script.google.com/macros/s/AKfycbxj3cuMgcG0yENin7dGaB-OlIBnX6VMeogVDBCNjWHrzTDa69-TjY85MVaLmH-HezXZ/exec";  
    const LIFF_ID = "2008905608-DekFDzvW"; 

    window.onload = function() {
        liff.init({ liffId: LIFF_ID }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(profile => {
                    // 有 LINE ID，先嘗試用 LINE ID 無感查詢
                    fetchOrders(profile.userId, 'userId');
                });
            } else {
                // 沒有登入 LINE，直接顯示電話輸入框
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('phoneSection').style.display = 'block';
            }
        });
    };

    // 點擊「開始查詢」執行的動作
    function searchByPhone() {
        let phone = document.getElementById('searchPhone').value.trim();
        if (!phone) {
            alert('請輸入電話號碼！');
            return;
        }
        document.getElementById('phoneSection').style.display = 'none';
        document.getElementById('orderListSection').style.display = 'none';
        document.getElementById('loadingSection').style.display = 'block';
        fetchOrders(phone, 'phone');
    }

    // 發送查詢請求到後端
    function fetchOrders(searchValue, searchType) {
        let requestUrl = API_URL + "?action=getMyOrders&" + searchType + "=" + encodeURIComponent(searchValue);

        fetch(requestUrl)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loadingSection').style.display = 'none';
            let listSection = document.getElementById('orderListSection');
            listSection.style.display = 'block';

            if (data.status === 'success') {
                
                // 狀況一：沒有找到任何訂單
                if (data.orders.length === 0) {
                    if (searchType === 'userId') {
                        // 如果是用 LINE 找卻沒找到，顯示溫馨提示，並「自動打開」電話查詢框
                        listSection.innerHTML = `
                            <div class="order-card text-center" style="padding: 20px 10px;">
                                <h6 style="font-weight: bold; color: var(--text-dark); margin: 0;">目前 LINE 帳號尚無紀錄</h6>
                            </div>`;
                        document.getElementById('phoneSection').style.display = 'block';
                    } else {
                        // 如果是用電話找卻沒找到
                        listSection.innerHTML = `
                            <div class="order-card text-center" style="padding: 40px 20px;">
                                <i class="fas fa-search-minus" style="font-size: 3rem; color: #D7CCC8; margin-bottom: 15px;"></i>
                                <h5 style="font-weight: bold; color: var(--text-dark);">查無此電話的訂單</h5>
                                <p style="color: #8D6E63; font-size: 0.95rem;">請確認號碼是否輸入正確。</p>
                            </div>`;
                        document.getElementById('phoneSection').style.display = 'block'; // 讓框框留著，客人可以重輸
                    }
                    return;
                }

                // 狀況二：有找到訂單，開始組合 HTML
                let htmlStr = '';
                data.orders.forEach((o) => {
                    let isDone = (o.status === '已處理');
                    let statusClass = isDone ? 'status-done' : 'status-wait';
                    let statusIcon = isDone ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-clock"></i>';

                    htmlStr += `
                    <div class="order-card">
                        <div class="order-header">
                            <b style="font-size: 1.1rem; color: var(--text-dark);">🗓️ 取貨：${o.pickupDate}</b>
                            <span class="status-badge ${statusClass}">${statusIcon} ${o.status}</span>
                        </div>
                        <div style="color: #8D6E63; font-size: 0.85rem; margin-bottom: 10px;">下單時間：${o.time}</div>
                        <div style="line-height: 1.8; color: #4A4641; font-weight: 500;">
                            ${o.pork > 0 ? '🍖 封肉 x '+o.pork+'<br>' : ''}
                            ${o.thigh > 0 ? '🍗 蹄膀 x '+o.thigh+'<br>' : ''}
                            ${o.feet > 0 ? '🐷 豬腳 x '+o.feet+'<br>' : ''}
                            ${o.bamboo > 0 ? '🎋 筍干 x '+o.bamboo+'<br>' : ''}
                            ${o.extra > 0 ? '🦴 加購腳蹄 x '+o.extra : ''}
                        </div>
                    </div>`;
                });
                
                // 如果客人一開始是用 LINE 成功查到新訂單，我們在最下面補上一顆按鈕，讓他可以切換找舊的
                if (searchType === 'userId') {
                    htmlStr += `
                    <div class="text-center mt-3 mb-4">
                        <button class="btn btn-sm" style="color: #8D6E63; border: 1px solid #D7CCC8; background: #FAFAFA; padding: 8px 15px; border-radius: 20px;" 
                            onclick="document.getElementById('phoneSection').style.display='block'; this.style.display='none';">
                            <i class="fas fa-search"></i> 沒看到舊訂單？改用電話查詢
                        </button>
                    </div>`;
                }
                
                // 如果客人是用電話查的，給他一個「查詢其他號碼」的按鈕
                if (searchType === 'phone') {
                    document.getElementById('phoneSection').style.display = 'none';
                    htmlStr += `
                    <div class="text-center mt-3 mb-4">
                        <button class="btn btn-sm" style="color: #8D6E63; border: 1px solid #D7CCC8; background: #FAFAFA; padding: 8px 15px; border-radius: 20px;" 
                            onclick="document.getElementById('phoneSection').style.display='block'; document.getElementById('orderListSection').style.display='none'; document.getElementById('searchPhone').value='';">
                            <i class="fas fa-redo"></i> 查詢其他號碼
                        </button>
                    </div>`;
                }

                listSection.innerHTML = htmlStr;

            } else {
                listSection.innerHTML = '<div class="text-center text-danger">讀取失敗，請重新整理</div>';
            }
        })
        .catch(err => {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('orderListSection').style.display = 'block';
            document.getElementById('orderListSection').innerHTML = '<div class="text-center text-danger">連線異常，請稍後再試</div>';
        });
    }
</script>

</body>
</html>
